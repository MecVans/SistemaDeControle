services:
  backend:
    build: ./ControleDeGastos
    ports:
      - "5000:5000"
      - "5211:5211"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5211

  frontend:
    build: ./ControleDeGastosFront
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:5211
    depends_on:
      - backend