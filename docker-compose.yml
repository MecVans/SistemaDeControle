version: '3.8'

services:
  backend:
    build: ./ControleDeGastos
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000

  frontend:
    build: ./ControleDeGastosFront
    ports:
      - "5173:80"
    depends_on:
      - backend